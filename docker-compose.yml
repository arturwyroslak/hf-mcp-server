version: "3.9"

services:
  hf-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: hf-mcp-server:latest
    container_name: hf-mcp-server
    restart: unless-stopped
    environment:
      HF_TOKEN: ${HF_TOKEN}
      HF_READ_ONLY: ${HF_READ_ONLY:-false}
      HF_ADMIN_MODE: ${HF_ADMIN_MODE:-false}
      HF_MAX_FILE_SIZE: ${HF_MAX_FILE_SIZE:-104857600}
      HF_INFERENCE_TIMEOUT: ${HF_INFERENCE_TIMEOUT:-30}
      MCP_HOST: ${MCP_HOST:-0.0.0.0}
      MCP_PORT: ${MCP_PORT:-8000}
      MCP_PATH: ${MCP_PATH:-/mcp}
    ports:
      - "${MCP_PORT:-8000}:8000"
    volumes:
      - hf_cache:/home/mcpuser/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/mcp"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  hf_cache:
    driver: local
