services:
  hf-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: hf-mcp-server:latest
    container_name: hf-mcp-server
    restart: unless-stopped
    environment:
      HF_TOKEN: ${HF_TOKEN}
      HF_READ_ONLY: ${HF_READ_ONLY:-false}
      HF_ADMIN_MODE: ${HF_ADMIN_MODE:-false}
      MCP_HOST: ${MCP_HOST:-0.0.0.0}
      MCP_PORT: ${MCP_PORT:-8000}
      HF_UPLOAD_TIMEOUT: ${HF_UPLOAD_TIMEOUT:-300}
      HF_CACHE_TTL: ${HF_CACHE_TTL:-180}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
    ports:
      - "${MCP_PORT:-8000}:8000"
    networks:
      - dokploy-network
    # Lightweight healthcheck — just TCP, no curl overhead
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

networks:
  dokploy-network:
    external: true
